# Badhiya Phase 3 — full auth + onboarding E2E flow.
#
# Prerequisites:
#   - Backend running on 10.0.2.2:4000 with SMS_PROVIDER=console in .env
#   - Database migrations applied
#   - Redis up (for OTP storage)
#   - When this test runs, check the backend console for the OTP —
#     the test currently stops at the OTP entry step for manual input.
#
# For a fully-automated version we'd need a dev-only endpoint like
# /auth/debug/read-otp?phone=... that returns the last OTP from Redis.

appId: com.badhiya.app
---
- launchApp:
    clearState: true
- assertVisible: "BADHIYA"
- assertVisible: "Business ho jayega badhiya!"
- takeScreenshot: 01-login

# Phone entry
- tapOn:
    id: "login-phone"
- inputText: "9319788556"
- takeScreenshot: 02-phone-entered
- tapOn:
    id: "login-send-otp"

# OTP screen loads
- extendedWaitUntil:
    visible: "Enter OTP"
    timeout: 5000
- takeScreenshot: 03-otp-screen

# Manual pause — operator reads OTP from backend console and types it.
# In CI this would be: - inputText: "123456" with a fixed dev OTP.
- runFlow:
    commands:
      - assertVisible: "Enter OTP"

# Skip rest of flow when no real backend — smoke test proves the UX up to OTP.
